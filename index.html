<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2A5C45">
<title>JobFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Sarabun',sans-serif;background:#F5F3EE;color:#1A1916;min-height:100vh}.app{max-width:520px;margin:0 auto}.topbar{background:#FDFCFA;border-bottom:1px solid #E8E5DE;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}.logo{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;color:#2A5C45}.sub{font-size:11px;color:#9C9890}.btn-r{display:flex;gap:8px}.btn-i{width:36px;height:36px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px}.btn-rf{background:#F0EDE6;color:#6B6760}.btn-ad{background:#2A5C45;color:white;font-size:18px}.ct{padding:16px 16px 24px}.stats{display:flex;gap:8px;margin-bottom:16px}.stat{flex:1;background:#FDFCFA;border:1px solid #E8E5DE;border-radius:12px;padding:12px 14px}.stat-l{font-size:10px;color:#9C9890;text-transform:uppercase;letter-spacing:0.04em}.stat-v{font-size:24px;font-weight:700;font-family:'IBM Plex Mono',monospace}.ab{background:#FEF3C7;border:1px solid #F59E0B;border-radius:12px;padding:8px 12px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-size:12px;color:#92400E}.tabs{display:flex;gap:4px;background:#F0EDE6;padding:3px;border-radius:10px;margin-bottom:14px}.tb{flex:1;padding:7px 8px;border-radius:8px;border:none;font-size:12px;cursor:pointer;font-family:'Sarabun',sans-serif;background:transparent;color:#9C9890}.tb.on{background:#FDFCFA;color:#1A1916;font-weight:600;box-shadow:0 1px 2px rgba(0,0,0,.06)}.grp{margin-bottom:8px}.gh{background:#FDFCFA;border:1px solid #E8E5DE;padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-radius:12px}.gh.op{border-radius:12px 12px 0 0}.gbg{background:#2A5C45;color:white;font-size:12px;font-weight:700;padding:3px 10px;border-radius:8px}.gcn{font-size:13px;color:#6B6760;margin-left:8px}.cv{color:#9C9890;font-size:11px;transition:transform .2s}.cv.op{transform:rotate(180deg)}.gb{background:#FDFCFA;border:1px solid #E8E5DE;border-top:none;border-radius:0 0 12px 12px}.cd{padding:12px 14px;border-bottom:.5px solid #F0EDE6;cursor:pointer}.cd.al{background:#FFF7ED}.cdt{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:4px}.cdc{display:flex;align-items:center;gap:6px}.cob{background:#2A5C45;color:white;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px}.jcc{font-size:11px;color:#6B6760;font-family:'IBM Plex Mono',monospace}.ch{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}.chd{width:5px;height:5px;border-radius:50%;display:inline-block}.cdn{font-size:14px;font-weight:600;margin-bottom:3px}.cdm{font-size:11px;color:#9C9890;margin-bottom:6px}.cdf{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px}.cdt2{display:flex;gap:6px;align-items:center}.tg{font-size:10px;padding:1px 6px;border-radius:10px}.tpy{color:#2A5C45;background:#ECFDF5;font-weight:600}.tpn{color:#92580A;background:#FFF3E0}.tv{font-size:10px;color:#9C9890}.cdd{font-size:10px;color:#9C9890}.cdd.w{color:#991B1B;font-weight:600}.emp{text-align:center;padding:30px;color:#9C9890;font-size:13px}.bk{background:none;border:none;color:#9C9890;font-size:13px;cursor:pointer;padding:4px 0;margin-bottom:10px}.bx{background:#FDFCFA;border:1px solid #E8E5DE;border-radius:14px;padding:16px 18px;margin-bottom:10px}.sc{font-size:11px;color:#9C9890;letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px}.ig{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;margin-top:10px;font-size:12px}.ik{color:#9C9890}.iv{font-weight:500}.mn{font-family:'IBM Plex Mono',monospace}.bw{margin-top:10px;background:#FFF7ED;border:1px solid #FED7AA;border-radius:10px;padding:8px 12px;font-size:12px;color:#92400E}.bd{margin-top:10px;background:#EBF3EF;border:1px solid #C8E8D8;border-radius:10px;padding:8px 12px;font-size:12px;color:#2A5C45}.bm{margin-top:8px;background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;padding:8px 12px;font-size:12px;color:#991B1B}.rw{display:flex;justify-content:space-between;padding:6px 0;border-bottom:.5px solid #F0EDE6}.rw:last-child{border-bottom:none}.rk{font-size:12px;color:#9C9890}.rv{font-size:12px;font-weight:500;font-family:'IBM Plex Mono',monospace}.be{width:100%;padding:12px;background:#1A1916;color:white;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif}.bs{flex:1;padding:10px;background:#2A5C45;color:white;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Sarabun',sans-serif}.bc{flex:1;padding:10px;border:1px solid #DDD9D0;border-radius:10px;background:none;font-size:13px;cursor:pointer;color:#6B6760;font-family:'Sarabun',sans-serif}.st{display:flex;gap:10px}.stc{display:flex;flex-direction:column;align-items:center}.std{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}.std.dn{background:#2A5C45}.std.ac{background:#D4900A}.std.fu{background:transparent;border:1.5px solid #DDD9D0}.stl{width:1.5px;height:16px;margin:2px 0}.stl.dn{background:#2A5C45}.stl.fu{background:#E8E5DE}.stt{font-size:12px;padding-top:2px}.stt.dn{color:#9C9890}.stt.ac{color:#1A1916;font-weight:600}.stt.fu{color:#C4C0B8}.fl label{display:block;font-size:11px;color:#9C9890;margin-top:10px;margin-bottom:4px}.fl input,.fl select{width:100%;padding:8px 10px;border:1px solid #DDD9D0;border-radius:8px;background:#F5F3EE;color:#1A1916;font-family:'Sarabun',sans-serif;font-size:13px;outline:none}.fl input:focus,.fl select:focus{border-color:#4A9B72;background:white}.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}.fa{display:flex;gap:8px;margin-top:14px}.ov{display:none;position:fixed;inset:0;background:rgba(20,18,14,.5);z-index:50;align-items:flex-end;justify-content:center}.ov.sh{display:flex}.md{background:#FDFCFA;border-radius:20px 20px 0 0;padding:20px 18px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto}.mh{display:flex;justify-content:space-between;margin-bottom:16px}.mt{font-size:16px;font-weight:700}.mx{width:28px;height:28px;border-radius:8px;border:none;background:#F0EDE6;cursor:pointer;font-size:13px;color:#6B6760}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const API="https://script.google.com/macros/s/AKfycbxpwKY5Dbb25SvDAIpNTnOuF1V_TRF86Eq0DJ_97JUrIbtTV3MfK1gEknbvMR13lhYZEA/exec";
const STS=["รับงาน","รอข้อมูลจากลูกค้า","ตั้งกล้อง ส่งลูกค้า","รอลูกค้าเลือกมุม","ส่งใบเสนอราคา","ดำเนินการ ส่งภาพ draft","รอลูกค้าคอมเม้น","แก้ไขตามคอมเม้น","ส่ง final","วางบิล ส่งเอกสาร","รับเงินแล้ว"];
const WE=["รับงาน","ตั้งกล้อง ส่งลูกค้า","ส่งใบเสนอราคา","ดำเนินการ ส่งภาพ draft","แก้ไขตามคอมเม้น","ส่ง final","วางบิล ส่งเอกสาร"];
const WA=["รอข้อมูลจากลูกค้า","รอลูกค้าเลือกมุม","รอลูกค้าคอมเม้น"];
const CS={"รับงาน":["#F0EDE6","#6B6760","#9C9890"],"รอข้อมูลจากลูกค้า":["#FFF3E0","#92580A","#D4900A"],"ตั้งกล้อง ส่งลูกค้า":["#EBF3EF","#2A5C45","#4A9B72"],"รอลูกค้าเลือกมุม":["#FFF3E0","#92580A","#D4900A"],"ส่งใบเสนอราคา":["#E8F0FE","#1A4A7A","#378ADD"],"ดำเนินการ ส่งภาพ draft":["#EBF3EF","#2A5C45","#4A9B72"],"รอลูกค้าคอมเม้น":["#FFF3E0","#92580A","#D4900A"],"แก้ไขตามคอมเม้น":["#EBF3EF","#2A5C45","#4A9B72"],"ส่ง final":["#E8F0FE","#1A4A7A","#378ADD"],"วางบิล ส่งเอกสาร":["#F3E8FF","#6B21A8","#9333EA"],"รับเงินแล้ว":["#ECFDF5","#166534","#22C55E"]};

let jobs=[],sel=null,tab="todo",og={},pg="dash";
const $=id=>document.getElementById(id);
const fm=n=>Number(n||0).toLocaleString("th-TH");
const fD=d=>{if(!d)return"—";const t=new Date(d);return isNaN(t)?String(d):t.toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"2-digit"})};
const dd=d=>{if(!d)return 0;return Math.floor((new Date()-new Date(d))/86400000)};
const pc=c=>{if(!c)return["",""];const p=String(c).split("_");return p.length>=2?[p[0],p.slice(1).join("_")]:[c,""]};
const ch=s=>{const c=CS[s]||["#F0EDE6","#6B6760","#9C9890"];return`<span class="ch" style="background:${c[0]};color:${c[1]}"><span class="chd" style="background:${c[2]}"></span>${s}</span>`};

async function aG(a){const u=new URL(API);u.searchParams.set("action",a);return(await fetch(u)).json()}
async function aP(b){return(await fetch(API,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(b)})).json()}

async function load(){render();try{const r=await aG("getJobs");jobs=r.jobs||[];if(sel){const u=jobs.find(j=>j.job_id===sel.job_id);if(u)sel=u}}catch(e){console.error(e)}render()}

function render(){
const ac=jobs.filter(j=>j.status!=="รับเงินแล้ว"),td=ac.filter(j=>WE.includes(j.status)),wt=ac.filter(j=>WA.includes(j.status)),dn=jobs.filter(j=>j.status==="รับเงินแล้ว");
let h=`<div class="topbar"><div><div class="logo">JobFlow</div><div class="sub">${jobs.length?`ต้องทำ ${td.length} · รอลูกค้า ${wt.length}`:"กำลังโหลด..."}</div></div><div class="btn-r"><button class="btn-i btn-rf" onclick="load()">↻</button><button class="btn-i btn-ad" onclick="oA()">+</button></div></div><div class="ct">`;
if(pg==="detail"&&sel)h+=rD(td,wt,dn);else h+=rL(td,wt,dn);
h+=`</div><div class="ov" id="mo"><div class="md" id="mc"></div></div>`;
$("app").innerHTML=h;
}

function rL(td,wt,dn){
const al=wt.filter(j=>j.status==="รอลูกค้าคอมเม้น"&&dd(j.status_updated)>=14);
const cr=tab==="todo"?td:tab==="waiting"?wt:dn;
let h=`<div class="stats"><div class="stat"><div class="stat-l">ต้องทำ</div><div class="stat-v" style="color:#2A5C45">${td.length}</div></div><div class="stat"><div class="stat-l">รอลูกค้า</div><div class="stat-v" style="color:#92580A">${wt.length}</div></div><div class="stat"><div class="stat-l">จบแล้ว</div><div class="stat-v" style="color:#166534">${dn.length}</div></div></div>`;
if(al.length)h+=`<div class="ab">⚠️ ${al.length} งาน รอคอมเม้นเกิน 14 วัน</div>`;
h+=`<div class="tabs"><button class="tb ${tab==="todo"?"on":""}" onclick="tab='todo';render()">ต้องทำ (${td.length})</button><button class="tb ${tab==="waiting"?"on":""}" onclick="tab='waiting';render()">รอลูกค้า (${wt.length})</button><button class="tb ${tab==="done"?"on":""}" onclick="tab='done';render()">จบแล้ว (${dn.length})</button></div>`;
if(!cr.length)return h+`<div class="emp">ไม่มีงาน</div>`;
const g={};cr.forEach(j=>{const[co]=pc(j.client_code);if(!g[co])g[co]=[];g[co].push(j)});
Object.entries(g).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([co,cj])=>{const op=og[co];h+=`<div class="grp"><div class="gh ${op?"op":""}" onclick="og['${co}']=!og['${co}'];render()"><div><span class="gbg">${co}</span><span class="gcn">${cj.length} งาน</span></div><span class="cv ${op?"op":""}">▾</span></div>`;if(op){h+=`<div class="gb">`;cj.forEach(j=>{const[c2,jc]=pc(j.client_code);const dy=dd(j.status_updated);const ia=j.status==="รอลูกค้าคอมเม้น"&&dy>=14;h+=`<div class="cd ${ia?"al":""}" onclick="sel=jobs.find(x=>x.job_id==='${j.job_id}');pg='detail';render()"><div class="cdt"><div class="cdc"><span class="cob">${c2}</span><span class="jcc">${jc}</span></div>${ch(j.status)}</div><div class="cdn">${j.project_name}</div><div class="cdm">${j.contact?("ติดต่อ "+j.contact):""}${j.items&&j.items.length?(" · "+j.items.map(i=>i.detail+"×"+i.qty).join(", ")):""}</div><div class="cdf"><div class="cdt2">${j.po_status==="yes"?'<span class="tg tpy">PO ✓</span>':'<span class="tg tpn">ยัง PO</span>'}<span class="tv">฿${fm(j.total_value)}</span></div>${dy>0?`<span class="cdd ${ia?"w":""}">${ia?"⚠️ ":""}${dy} วัน</span>`:""}</div></div>`});h+=`</div>`}h+=`</div>`});return h}

function rD(){const j=sel;if(!j)return"";const[co,jc]=pc(j.client_code);const dy=dd(j.status_updated);const ia=j.status==="รอลูกค้าคอมเม้น"&&dy>=14;const iw=WA.includes(j.status);const id=j.status==="รับเงินแล้ว";const ci=STS.indexOf(j.status);
let h=`<button class="bk" onclick="sel=null;pg='dash';render()">← กลับ</button>`;
h+=`<div class="bx"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span class="gbg">${co}</span><span class="jcc" style="font-size:13px">${jc}</span></div><div style="font-size:17px;font-weight:700;margin-bottom:4px">${j.project_name}</div><div class="ig"><div><span class="ik">ติดต่อ </span><span class="iv">${j.contact||"—"}</span></div><div><span class="ik">วันรับงาน </span><span class="iv">${fD(j.receive_date)}</span></div><div><span class="ik">มูลค่า </span><span class="iv mn">฿${fm(j.total_value)}</span></div><div><span class="ik">PO </span>${j.po_status==="yes"?`<span style="color:#2A5C45;font-weight:600">✓ ${j.po_number||"ออกแล้ว"}</span>`:`<span style="color:#92580A;font-weight:500">ยังไม่ออก</span>`}</div></div><div style="display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap">${ch(j.status)}${dy>0?`<span style="font-size:11px;color:${ia?"#991B1B":"#6B6760"}">อยู่ step นี้ ${dy} วัน</span>`:""}${ia?'<span style="background:#FECACA;color:#991B1B;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px">เกิน 14 วัน!</span>':""}</div>${iw?`<div class="bw">📌 ตอนนี้ <b>รอลูกค้า</b> — ${j.status}</div>`:""}${!iw&&!id?`<div class="bd">🔨 ตอนนี้ <b>เราต้องทำ</b> — ${j.status}</div>`:""}${j.missing_info&&ci<=STS.indexOf("ดำเนินการ ส่งภาพ draft")?`<div class="bm">⚠️ ขาดข้อมูล: ${j.missing_info}</div>`:""}</div>`;
h+=`<div class="bx"><div class="sc" style="margin-bottom:12px">ขั้นตอนงาน</div>`;
STS.forEach((s,i)=>{const dn2=i<ci,ac2=i===ci;const cl=dn2?"dn":ac2?"ac":"fu";h+=`<div class="st"><div class="stc"><div class="std ${cl}">${dn2?'<svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5l2.5 2.5L8 3" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg>':ac2?'<div style="width:6px;height:6px;border-radius:50%;background:white"></div>':""}</div>${i<STS.length-1?`<div class="stl ${dn2?"dn":"fu"}"></div>`:""}</div><div class="stt ${cl}">${s}</div></div>`});
h+=`</div>`;
h+=`<div class="bx"><div class="sc">เอกสาร & การเงิน</div>`;
[["เลขเสนอราคา",j.quotation_no||"—",""],["เลข PO",j.po_number||"—",""],["เลข Invoice",j.invoice_no||"—",""],["ใบกำกับภาษี",j.tax_no||"—",""],["วันส่ง Invoice",fD(j.invoice_date),""],["วันส่งเอกสาร",fD(j.doc_sent_date),""],["วันรับเงิน",fD(j.payment_date),j.payment_date?"#2A5C45":""],["ทวิ 50",j.wht==="yes"?"✓ ครบแล้ว":"ยัง",j.wht==="yes"?"#2A5C45":"#92580A"]].forEach(([k,v,c])=>{h+=`<div class="rw"><span class="rk">${k}</span><span class="rv" style="${c?`color:${c}`:""}">${v}</span></div>`});
h+=`</div>`;
if(j.items&&j.items.length){h+=`<div class="bx"><div class="sc">รายการภาพ</div>`;j.items.forEach(it=>{h+=`<div class="rw"><span style="font-size:13px">${it.detail||"—"} ×${it.qty}</span><span class="rv" style="color:#6B6760">฿${fm(it.unit_price)}</span></div>`});h+=`</div>`}
const nxSts=STS[ci+1];if(nxSts&&j.status!=="รับเงินแล้ว"){const nc=CS[nxSts]||["#EBF3EF","#2A5C45","#4A9B72"];h+=`<button class="be" style="background:${nc[1]};margin-bottom:8px" onclick="nxSt('${nxSts.replace(/'/g,"\\'")}')">⚡ เลื่อนเป็น "${nxSts}"</button>`;}h+=`<button class="be" onclick="oE()">✏️ แก้ไข / อัพเดทสถานะ</button>`;return h}

function oA(){let h=`<div class="mh"><span class="mt">เพิ่มงานใหม่</span><button class="mx" onclick="cM()">✕</button></div>`;h+=`<div class="fr"><div class="fl"><label>ชื่อเจ้า *</label><input id="a-co" placeholder="เช่น AP"></div><div class="fl"><label>รหัสงาน *</label><input id="a-jc" placeholder="เช่น 2601"></div></div>`;h+=`<div class="fl"><label>ชื่อโครงการ *</label><input id="a-nm" placeholder="เช่น Grande Pleno ศรีนครินทร์"></div>`;h+=`<div class="fr"><div class="fl"><label>ติดต่อ</label><input id="a-ct"></div><div class="fl"><label>วันรับงาน</label><input id="a-dt" type="date"></div></div>`;h+=`<div class="fr"><div class="fl"><label>สถานะ</label><select id="a-st">${STS.map(s=>`<option>${s}</option>`).join("")}</select></div><div class="fl"><label>มูลค่า (บาท)</label><input id="a-vl" type="number" placeholder="0"></div></div>`;h+=`<div class="fl"><label>หมายเหตุ</label><input id="a-rm"></div>`;h+=`<div class="fa"><button class="bc" onclick="cM()">ยกเลิก</button><button class="bs" id="a-sv" onclick="sA()">เพิ่มงาน</button></div>`;$("mc").innerHTML=h;$("mo").classList.add("sh")}

async function sA(){const co=$("a-co").value.trim(),jc=$("a-jc").value.trim(),nm=$("a-nm").value.trim();if(!co||!nm){alert("กรุณากรอกชื่อเจ้าและชื่อโครงการ");return}$("a-sv").textContent="กำลังเพิ่ม...";await aP({action:"addJob",client_code:co+(jc?"_"+jc:""),project_name:nm,contact:$("a-ct").value,receive_date:$("a-dt").value,status:$("a-st").value,total_value:$("a-vl").value||0,remark:$("a-rm").value,year:2026});cM();await load()}

function oE(){const j=sel;if(!j)return;let h=`<div class="mh"><span class="mt">แก้ไข</span><button class="mx" onclick="cM()">✕</button></div>`;h+=`<div class="fl"><label>สถานะ</label><select id="e-st">${STS.map(s=>`<option ${s===j.status?"selected":""}>${s}</option>`).join("")}</select></div>`;h+=`<div class="fl"><label>ข้อมูลที่ยังขาด</label><input id="e-mi" value="${j.missing_info||""}" placeholder="เช่น ยังขาด CAD, แบบต้นไม้"></div>`;h+=`<div class="fr"><div class="fl"><label>PO</label><select id="e-po"><option value="no" ${j.po_status!=="yes"?"selected":""}>ยังไม่ออก</option><option value="yes" ${j.po_status==="yes"?"selected":""}>ออกแล้ว</option></select></div><div class="fl"><label>เลข PO</label><input id="e-pn" value="${j.po_number||""}"></div></div>`;h+=`<div class="fr"><div class="fl"><label>เลขเสนอราคา</label><input id="e-qt" value="${j.quotation_no||""}"></div><div class="fl"><label>เลข Invoice</label><input id="e-iv" value="${j.invoice_no||""}"></div></div>`;h+=`<div class="fr"><div class="fl"><label>ใบกำกับภาษี</label><input id="e-tx" value="${j.tax_no||""}"></div><div class="fl"><label>วันส่ง Invoice</label><input id="e-id" type="date" value="${j.invoice_date||""}"></div></div>`;h+=`<div class="fr"><div class="fl"><label>วันส่งเอกสาร</label><input id="e-dd" type="date" value="${j.doc_sent_date||""}"></div><div class="fl"><label>วันรับเงิน</label><input id="e-pd" type="date" value="${j.payment_date||""}"></div></div>`;h+=`<div class="fl"><label>ทวิ 50</label><select id="e-wh"><option value="no" ${j.wht!=="yes"?"selected":""}>ยัง</option><option value="yes" ${j.wht==="yes"?"selected":""}>ครบแล้ว</option></select></div>`;h+=`<div class="fl"><label>หมายเหตุ</label><input id="e-rm" value="${j.remark||""}"></div>`;h+=`<div class="fa"><button class="bc" onclick="cM()">ยกเลิก</button><button class="bs" id="e-sv" onclick="sE()">💾 บันทึก</button></div>`;$("mc").innerHTML=h;$("mo").classList.add("sh")}

async function sE(){$("e-sv").textContent="กำลังบันทึก...";await aP({action:"updateJob",job_id:sel.job_id,status:$("e-st").value,missing_info:$("e-mi")?$("e-mi").value:sel.missing_info||"",po_status:$("e-po").value,po_number:$("e-pn").value,quotation_no:$("e-qt").value,invoice_no:$("e-iv").value,tax_no:$("e-tx").value,invoice_date:$("e-id").value,doc_sent_date:$("e-dd").value,payment_date:$("e-pd").value,wht:$("e-wh").value,remark:$("e-rm").value});cM();await load()}

async function nxSt(ns){if(!sel)return;const btn=document.querySelector(".be");if(btn)btn.textContent="กำลังเลื่อนสถานะ...";await aP({action:"updateJob",job_id:sel.job_id,status:ns,missing_info:sel.missing_info||"",po_status:sel.po_status,po_number:sel.po_number||"",quotation_no:sel.quotation_no||"",invoice_no:sel.invoice_no||"",tax_no:sel.tax_no||"",invoice_date:sel.invoice_date||"",doc_sent_date:sel.doc_sent_date||"",payment_date:sel.payment_date||"",wht:sel.wht||"no",remark:sel.remark||""});sel=null;pg="dash";await load()}
function cM(){$("mo").classList.remove("sh")}
document.addEventListener("click",e=>{if(e.target===$("mo"))cM()});
render();load();
</script>
</body>
</html>
